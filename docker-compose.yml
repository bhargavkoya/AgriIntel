# Docker Compose stub — full configuration in Phase 6

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
